name: scheduled govulncheck scan
on:
  schedule:
    - cron: '11 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  govulncheck:
    uses: sil-org/workflows/.github/workflows/govulncheck.yaml@main
    with:
      check-latest: false
      go-version-file: 'src/go.mod'
      go-version-input: ''
      work-dir: 'src'
      aws-region: ${{ vars.AWS_REGION }}
      aws-role: arn:aws:iam::369020531563:role/cloudflare-scanner-cd
      from-email: gtis_itse_alerts@groups.sil.org
      to-email: gtis_itse_support@sil.org
